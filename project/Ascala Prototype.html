<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ascala — Intelligent Validation Studio</title>
  <link rel="icon" href="assets/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="config.js"></script>

  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="api.jsx"></script>
  <script type="text/babel" src="Login.jsx"></script>
  <script type="text/babel" src="Panel1.jsx"></script>
  <script type="text/babel" src="Onboarding.jsx"></script>
  <script type="text/babel" src="Panel2.jsx"></script>
  <script type="text/babel" src="Report.jsx"></script>
  <script type="text/babel" src="Panel3.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "light",
      "density": "cozy",
      "accentMood": "warm"
    }/*EDITMODE-END*/;

    const { useState, useReducer, useEffect, useRef } = React;

    function reducer(state, action) {
      switch (action.type) {
        case 'personaDone': return { ...state, personaDone: true };
        case 'setSelected': return { ...state, selected: action.selected };
        case 'goSim': return { ...state, step: 3, simPhase: 'confirm' };
        case 'setSimPhase':
          if (action.simPhase === 'cancel') return { ...state, step: 2, simPhase: 'confirm' };
          return { ...state, simPhase: action.simPhase };
        case 'simDone': return { ...state, simPhase: 'done' };
        case 'setStep': return { ...state, step: action.step };
        default: return state;
      }
    }

    function App() {
      const [loggedIn, setLoggedIn] = useState(false);
      const [onboarded, setOnboarded] = useState(false);
      const [dark, setDark] = useState(false);
      const [tokens] = useState(20);
      const [projectName, setProjectName] = useState('Untitled project');
      const [mobileTab, setMobileTab] = useState('chat');
      const [isNarrow, setIsNarrow] = useState(() => window.innerWidth < 960);

      useEffect(() => {
        const onResize = () => setIsNarrow(window.innerWidth < 960);
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);
      const [files, setFiles] = useState([]);
      const [productMode, setProductMode] = useState('url');
      const [productUrl, setProductUrl] = useState('');
      const [screenshots, setScreenshots] = useState([]);
      const [videos, setVideos] = useState([]);
      const [reportId, setReportId] = useState(null);
      const [tweaksOpen, setTweaksOpen] = useState(false);
      const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

      // Backend wiring — see WIRING_PLAN.md
      const [mockMode, setMockMode] = useState(
        window.ASCALA_CONFIG ? window.ASCALA_CONFIG.DEFAULT_MOCK_MODE : true
      );
      const [chatSnapshot, setChatSnapshot] = useState([]);
      const [synthesisRunId, setSynthesisRunId] = useState(null);
      const [simulationRunId, setSimulationRunId] = useState(null);
      const [reportRunId, setReportRunId] = useState(null);
      const [startErrors, setStartErrors] = useState({ synthesis: null, simulation: null, report: null });
      const synthesis  = window.AscalaAPI.useRun('synthesis',  synthesisRunId);
      const simulation = window.AscalaAPI.useRun('simulation', simulationRunId);
      const report     = window.AscalaAPI.useRun('report',     reportRunId);

      const onStartSynthesis = async () => {
        setStartErrors(e => ({ ...e, synthesis: null }));
        try {
          const userMsgs = (chatSnapshot || [])
            .filter(m => m.role === 'user')
            .map(m => ({ role: 'user', text: m.text }));
          const fileObjs = (files || []).map(f => f.file).filter(Boolean);
          const id = await window.AscalaAPI.startSynthesis({
            files: fileObjs,
            chatTranscript: userMsgs,
            productUrl,
            mock: mockMode,
          });
          setSynthesisRunId(id);
        } catch (e) {
          setStartErrors(prev => ({ ...prev, synthesis: String(e.message || e) }));
        }
      };

      const onStartSimulation = async (goal) => {
        setStartErrors(e => ({ ...e, simulation: null, report: null }));
        setReportRunId(null);
        try {
          const shotObjs = (screenshots || []).map(s => s.file).filter(Boolean);
          const id = await window.AscalaAPI.startSimulation({
            synthesisRunId,
            screenshots: shotObjs,
            goal: goal || 'Sign up and complete onboarding',
            mock: mockMode,
          });
          setSimulationRunId(id);
        } catch (e) {
          setStartErrors(prev => ({ ...prev, simulation: String(e.message || e) }));
        }
      };

      const onResetSynthesis = () => {
        setSynthesisRunId(null);
        setStartErrors(e => ({ ...e, synthesis: null }));
      };
      const onResetSimulation = () => {
        setSimulationRunId(null);
        setReportRunId(null);
        setStartErrors(e => ({ ...e, simulation: null, report: null }));
      };

      // After simulation completes, auto-fire the report.
      useEffect(() => {
        if (simulation.status === 'done' && simulationRunId && !reportRunId) {
          window.AscalaAPI.startReport({ simulationRunId, mock: mockMode })
            .then(setReportRunId)
            .catch(err => setStartErrors(prev => ({ ...prev, report: String(err.message || err) })));
        }
      }, [simulation.status, simulationRunId, reportRunId, mockMode]);

      const [studio, dispatch] = useReducer(reducer, {
        step: 1,
        personaDone: false,
        selected: [],
        simPhase: 'confirm'
      });

      // Translate backend status into the existing studio reducer signals.
      useEffect(() => {
        if (synthesis.status === 'done' && !studio.personaDone) {
          dispatch({ type: 'personaDone' });
        }
      }, [synthesis.status, studio.personaDone]);

      useEffect(() => {
        if (simulation.status === 'done' && studio.simPhase !== 'done') {
          dispatch({ type: 'simDone' });
        }
      }, [simulation.status, studio.simPhase]);

      useEffect(() => {
        document.body.classList.toggle('dark', dark);
      }, [dark]);

      // edit mode
      useEffect(() => {
        const onMsg = (e) => {
          if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
          if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
        };
        window.addEventListener('message', onMsg);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', onMsg);
      }, []);

      const setTweak = (k, v) => {
        setTweaks(t => ({ ...t, [k]: v }));
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
        if (k === 'theme') setDark(v === 'dark');
      };

      // restore/persist login-skip
      useEffect(() => {
        if (tweaks.theme === 'dark') setDark(true);
      }, []);

      // open report function
      useEffect(() => {
        window.__openReport = (id) => setReportId(id);
      }, []);

      const [chatMessageSent, setChatMessageSent] = useState(false);
      const isStudioUnlocked = chatMessageSent || files.length > 0;

      const toggleTheme = () => { setDark(d => !d); setTweak('theme', dark ? 'light' : 'dark'); };

      if (!loggedIn) return React.createElement(Login, { onEnter: () => setLoggedIn(true) });

      if (!onboarded) return React.createElement(window.Onboarding, {
        files, setFiles,
        productMode, setProductMode,
        productUrl, setProductUrl,
        screenshots, setScreenshots,
        videos, setVideos,
        dark, onToggleTheme: toggleTheme, tokens,
        projectName, setProjectName,
        onContinue: () => setOnboarded(true)
      });

      return React.createElement(React.Fragment, null,
        React.createElement('div', { className: 'stage' + (isNarrow ? ' narrow' : '') },
          React.createElement(window.TopBar, {
            dark, onToggleTheme: toggleTheme, tokens,
            projectName, setProjectName,
            productUrl, screenshots, videos, productMode,
            fileCount: files.length,
            setFiles,
            onChangePrototype: () => setOnboarded(false)
          }),
          isNarrow && React.createElement('div', { className: 'mobile-tabs' },
            [
              { id: 'chat', label: 'Intelligence' },
              { id: 'studio', label: 'Studio' }
            ].map(t =>
              React.createElement('button', {
                key: t.id,
                className: 'mobile-tab' + (mobileTab === t.id ? ' active' : ''),
                onClick: () => setMobileTab(t.id)
              }, t.label)
            )
          ),
          React.createElement('div', {
            className: 'panels',
            'data-mobile': isNarrow ? mobileTab : 'all',
            style: { gridTemplateColumns: isNarrow ? '1fr' : '1fr 12px 1fr' }
          },
            React.createElement('div', { className: 'panel-gate' },
              React.createElement(Chat, {
                onNudgePersona: () => {},
                onMessageSent: () => setChatMessageSent(true),
                onMessagesChange: setChatSnapshot
              })
            ),
            !isNarrow && React.createElement('div', { className: 'panel-divider', style: { cursor: 'default', pointerEvents: 'none' } }),
            React.createElement('div', { className: 'panel-gate' + (!isStudioUnlocked ? ' locked' : '') },
              React.createElement(Studio, {
                state: studio, dispatch,
                mockMode, setMockMode,
                synthesis, simulation, report,
                onStartSynthesis, onStartSimulation,
                onResetSynthesis, onResetSimulation,
                startErrors
              }),
              !isStudioUnlocked && React.createElement('div', { className: 'panel-gate-overlay' },
                React.createElement('svg', { width: 18, height: 18, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 1.5, strokeLinecap: 'round', strokeLinejoin: 'round', style: { color: 'var(--ink-30)' } },
                  React.createElement('rect', { x: 3, y: 11, width: 18, height: 11, rx: 2, ry: 2 }),
                  React.createElement('path', { d: 'M7 11V7a5 5 0 0 1 10 0v4' })
                ),
                React.createElement('div', { className: 'panel-gate-label' }, 'Send a message to unlock')
              )
            )
          )
        ),
        reportId && React.createElement(Report, {
          testId: reportId,
          onClose: () => setReportId(null),
          simulationResult: simulation.result,
          report: report.result,
          reportStatus: report.status,
          reportError: report.error || startErrors.report
        }),
        tweaksOpen && React.createElement('div', { className: 'tweaks-panel' },
          React.createElement('div', { className: 'tweaks-head' },
            'Tweaks',
            React.createElement('button', { onClick: () => setTweaksOpen(false), style: { color: 'var(--ink-40)' } },
              React.createElement(IconX, { width: 12, height: 12 })
            )
          ),
          React.createElement('div', { className: 'tweaks-body' },
            React.createElement('div', { className: 'tweak-row' },
              React.createElement('label', null, 'Theme'),
              React.createElement('div', { className: 'tweak-opts' },
                ['light', 'dark'].map(m =>
                  React.createElement('button', {
                    key: m,
                    className: 'tweak-opt' + (tweaks.theme === m ? ' active' : ''),
                    onClick: () => setTweak('theme', m)
                  }, m)
                )
              )
            ),
            React.createElement('div', { className: 'tweak-row' },
              React.createElement('label', null, 'Density'),
              React.createElement('div', { className: 'tweak-opts' },
                ['cozy', 'compact'].map(m =>
                  React.createElement('button', {
                    key: m,
                    className: 'tweak-opt' + (tweaks.density === m ? ' active' : ''),
                    onClick: () => setTweak('density', m)
                  }, m)
                )
              )
            ),
            React.createElement('div', { className: 'tweak-row' },
              React.createElement('label', null, 'Reset flow'),
              React.createElement('button', {
                className: 'tweak-opt',
                onClick: () => {
                  setLoggedIn(false);
                  setOnboarded(false);
                  dispatch({ type: 'setStep', step: 1 });
                }
              }, 'restart')
            )
          )
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
